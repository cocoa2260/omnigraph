services:
  # Backend: FastAPI & Langchain 엔진
  api:
    build: .
    container_name: omnigraph-api
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - chroma-db

  # Frontend: Streamlit 인터페이스
  ui:
    build: .
    container_name: omnigraph-ui
    command: streamlit run gui.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api

  # Vector Database: ChromaDB (데이터 영속성 확보)
  chroma-db:
    image: chromadb/chroma:latest
    container_name: omnigraph-db
    volumes:
      - ./chroma_data:/chroma/chroma
    ports:
      - "8000:8000" # 내부 포트 충돌 주의 필요 시 변경